name = "jaronitenewsinc"
main = "index.js"
compatibility_date = "2026-06-19"

# Custom domain(s) served by this Worker. Requires jaronitenews.com to be a
# zone on this Cloudflare account; wrangler creates the custom-domain binding
# on deploy. Remove the www line if you don't want the www subdomain.
routes = [
  { pattern = "jaronitenews.com", custom_domain = true },
  { pattern = "www.jaronitenews.com", custom_domain = true },
]

[site]
bucket = "./"

[[d1_databases]]
binding = "DB"
database_name = "jaronite-news-db"
database_id = "bd77a83b-8cb6-4f8c-9db8-cc68db69d93d"

[observability.logs]
enabled = true
invocation_logs = true

[triggers]
crons = ["0 20 * * *", "0 0 * * *"]
# 8 PM UTC  → award bids for tomorrow, mark winners/losers
# Midnight UTC → (same scheduled handler checks the hour to distinguish)

[vars]
RESEND_FROM_EMAIL = "Jaronite News <ads@jaronitenews.com>"
DISCORD_GUILD_ID = "1513015724455628940"
DC_ECONOMY_ACCOUNT_ID = "118045"
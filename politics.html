<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Politics — Jaronite News</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>

<header class="site-header">
  <div class="site-header-inner">
    <div class="masthead">
      <img src="logo.png" alt="Jaronite News Logo">
      <div class="masthead-text">
        <h1>Jaronite <span>News</span> Inc.</h1>
        <div class="tagline">DemocracyCraft's Official Press — Est. 2024</div>
      </div>
    </div>
    <nav class="site-nav">
      <a href="/">Home</a>
      <a href="/politics" class="active">Politics</a>
      <a href="/economy">Economy</a>
      <a href="/guides">Guides</a>
      <a href="/miscellaneous">Misc</a>
      <a href="/portal">Staff Portal</a>
    </nav>
  </div>
</header>

<main class="category-page">
  <div class="category-page-header">
    <div class="breadcrumb"><a href="/">Home</a> / Politics</div>
    <h1>Politics</h1>
    <div class="category-accent-bar" style="background:#7c5cbf;"></div>
  </div>

  <div id="articles-container" class="state-loading">Loading dispatches...</div>
</main>

<!-- ARTICLE MODAL -->
<div class="article-modal-overlay" id="article-modal" onclick="handleModalClick(event)">
  <div class="article-modal" id="article-modal-panel">
    <div class="article-modal-header">
      <button class="article-modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      <div class="article-modal-stamp" id="modal-stamp">Mayoral Election · Jaronite News Inc.</div>
      <h2 class="article-modal-title" id="modal-title">Loading...</h2>
      <div class="article-modal-meta" id="modal-meta"></div>
    </div>
    <div class="article-modal-body" id="modal-body"></div>
  </div>
</div>

<footer class="site-footer">
  © 2026 Jaronite News Inc. — Covering DemocracyCraft with Integrity ·
  <a href="/portal">Staff Portal</a>
</footer>

<script>
  const CATEGORY_SLUG  = 'politics';
  const CATEGORY_LABEL = 'Politics';

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // Convert plain-text content to HTML paragraphs (split on blank lines),
  // escaping everything so no raw markup ever executes.
  function contentToHtml(raw) {
    const paragraphs = raw.split(/\n{2,}/);
    if (paragraphs.length <= 1) {
      // Single block — split on single newlines into <br> instead
      return `<p>${escapeHtml(raw).replace(/\n/g, '<br>')}</p>`;
    }
    return paragraphs
      .map(p => `<p>${escapeHtml(p.trim()).replace(/\n/g, '<br>')}</p>`)
      .join('');
  }

  function buildBylineMeta(article) {
    const date = new Date(article.created_at).toLocaleDateString('en-US', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
    const authorPart = `By ${escapeHtml(article.author)}`;

    let reviewPart;
    if (article.reviewed_by) {
      reviewPart = `Reviewed by <span class="reviewer">${escapeHtml(article.reviewed_by)}</span>`;
    } else {
      reviewPart = `<span class="self-pub">Self-Published</span>`;
    }

    return `<span>${authorPart}</span><span>${reviewPart}</span><span>${date}</span>`;
  }

  let articles = [];

  async function loadArticles() {
    const container = document.getElementById('articles-container');

    try {
      const res = await fetch(`/api/articles?category=${CATEGORY_SLUG}`);
      articles = await res.json();
    } catch (e) {
      container.innerHTML = '<div class="state-empty"><strong>Couldn\'t load articles</strong>Check your connection and try again.</div>';
      return;
    }

    if (!Array.isArray(articles) || articles.length === 0) {
      container.innerHTML = '<div class="state-empty"><strong>No stories yet</strong>Check back soon — our reporters are on it.</div>';
      return;
    }

    container.className = 'articles-grid';
    container.innerHTML = articles.map((a, i) => `
      <div class="article-summary-card" onclick="openModal(${i})" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openModal(${i})">
        <div class="card-category">${CATEGORY_LABEL}</div>
        <h3>${escapeHtml(a.title)}</h3>
        <div class="card-byline">By ${escapeHtml(a.author)}</div>
        <div class="card-date">${new Date(a.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })}</div>
      </div>
    `).join('');
  }

  // ---------- Article integrity polling ----------
  //
  // Every 5s while an article modal is open, two checks run:
  //
  // 1. SERVER check — fetch /api/article-hash to see if the article changed
  //    or was removed server-side (editor edit, censorship, deletion). If it
  //    changed: silently re-fetch and re-render. If it's gone: notice + redirect.
  //    This is normal content management, never treated as tampering.
  //
  // 2. LOCAL tamper check — compare what's currently displayed in the DOM
  //    against the original source strings we rendered from. We store the
  //    raw title and content strings from the API response, then on each tick
  //    read modal-title.textContent and reconstruct the body text from the
  //    rendered <p> elements and compare directly. No hashing of DOM content —
  //    that was unreliable because textContent on a container includes
  //    browser-inserted whitespace nodes that vary between reads.
  //    If the strings don't match, someone edited the DOM → kick to homepage.

  let integrityTimer   = null;
  let currentArticleId = null;
  let currentServerHash = null;
  // The raw source strings we rendered — ground truth for tamper detection.
  let renderedTitle   = null;
  let renderedContent = null;

  function renderArticle(a) {
    document.getElementById('modal-stamp').textContent = `${CATEGORY_LABEL} · Jaronite News Inc.`;
    document.getElementById('modal-title').textContent = a.title;
    document.getElementById('modal-meta').innerHTML = buildBylineMeta(a);
    document.getElementById('modal-body').innerHTML = contentToHtml(a.content);
  }

  // Reconstruct the body text the same way contentToHtml would produce it,
  // by reading each <p> element's textContent (already HTML-decoded by the
  // browser) and joining with double-newline — matching the paragraph split
  // logic in contentToHtml without touching the container's textContent.
  function readDisplayedBody() {
    const paras = document.getElementById('modal-body').querySelectorAll('p');
    return [...paras].map(p => p.textContent).join('\n\n');
  }

  // Normalise the original content string the same way so the comparison is
  // apples-to-apples: contentToHtml splits on /\n{2,}/ and trims each block,
  // so we do the same reconstruction from the source string.
  function normaliseContent(raw) {
    const blocks = raw.split(/\n{2,}/);
    if (blocks.length <= 1) return raw; // single-block articles stay as-is
    return blocks.map(b => b.trim()).join('\n\n');
  }

  function checkTamper() {
    if (renderedTitle === null) return;
    const displayedTitle = document.getElementById('modal-title').textContent;
    const displayedBody  = readDisplayedBody();
    const expectedBody   = normaliseContent(renderedContent);
    if (displayedTitle !== renderedTitle || displayedBody !== expectedBody) {
      stopIntegrityPolling();
      alert('This article\'s content doesn\'t match what was published — you\'re being returned to the homepage.');
      window.location.href = '/';
    }
  }

  // Small inline notice for benign server-side events (article updated/gone).
  function showNotice(message) {
    let notice = document.getElementById('modal-notice');
    if (!notice) {
      notice = document.createElement('div');
      notice.id = 'modal-notice';
      notice.className = 'modal-notice';
      document.getElementById('modal-body').prepend(notice);
    }
    notice.textContent = message;
  }

  async function refreshArticleFromServer(id) {
    try {
      const res  = await fetch(`/api/article-hash?id=${id}`);
      const data = await res.json();

      if (!data.exists) {
        stopIntegrityPolling();
        showNotice('This article is no longer available — returning to the homepage.');
        setTimeout(() => { window.location.href = '/'; }, 2000);
        return;
      }

      if (data.hash !== currentServerHash) {
        const fullRes = await fetch(`/api/articles?category=${CATEGORY_SLUG}`);
        const fresh   = await fullRes.json();
        const updated = Array.isArray(fresh) ? fresh.find(x => x.id === id) : null;
        if (!updated) {
          stopIntegrityPolling();
          showNotice('This article is no longer available — returning to the homepage.');
          setTimeout(() => { window.location.href = '/'; }, 2000);
          return;
        }
        renderArticle(updated);
        currentServerHash = data.hash;
        renderedTitle   = updated.title;
        renderedContent = updated.content;
        showNotice('This article was just updated by an editor — showing the latest version.');
        setTimeout(() => { const n = document.getElementById('modal-notice'); if (n) n.remove(); }, 4000);
      }
    } catch (e) {
      // Network hiccup — skip this tick, try again next interval.
    }
  }

  function startIntegrityPolling(id) {
    stopIntegrityPolling();
    currentArticleId = id;
    integrityTimer = setInterval(() => {
      checkTamper();
      if (currentArticleId !== null) refreshArticleFromServer(currentArticleId);
    }, 5000);
  }

  function stopIntegrityPolling() {
    if (integrityTimer) clearInterval(integrityTimer);
    integrityTimer    = null;
    currentArticleId  = null;
    currentServerHash = null;
    renderedTitle     = null;
    renderedContent   = null;
  }

  async function openModal(index) {
    const a = articles[index];
    if (!a) return;

    renderArticle(a);
    // Store the source strings BEFORE any await so there's no window where
    // the DOM could be read before these are set.
    renderedTitle   = a.title;
    renderedContent = a.content;

    document.getElementById('article-modal').classList.add('open');
    document.body.style.overflow = 'hidden';

    try {
      const res  = await fetch(`/api/article-hash?id=${a.id}`);
      const data = await res.json();
      currentServerHash = data.exists ? data.hash : null;
    } catch (e) {
      currentServerHash = null;
    }
    startIntegrityPolling(a.id);
  }

  function closeModal() {
    document.getElementById('article-modal').classList.remove('open');
    document.body.style.overflow = '';
    stopIntegrityPolling();
    const n = document.getElementById('modal-notice');
    if (n) n.remove();
  }

  function handleModalClick(e) {
    // Close if the click landed on the overlay backdrop, not the panel itself
    if (e.target === document.getElementById('article-modal')) closeModal();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
  });

  loadArticles();
</script>

</body>
</html>

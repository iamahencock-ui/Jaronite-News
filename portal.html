<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jaronite News — Employee Portal</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      background: #0d0d0d !important;
      color: #f0f0f0 !important;
      font-family: 'Georgia', serif !important;
    }

    input, textarea, select {
      background: #111 !important;
      border: 1px solid #333 !important;
      color: #f0f0f0 !important;
      padding: 10px 14px !important;
      border-radius: 8px !important;
      font-size: 1rem !important;
      width: 100% !important;
      outline: none !important;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #c9a84c !important;
    }

    button {
      background: #c9a84c !important;
      color: #000 !important;
      border: none !important;
      padding: 12px !important;
      border-radius: 8px !important;
      font-size: 1rem !important;
      font-weight: bold !important;
      cursor: pointer !important;
      width: 100% !important;
    }

    button:hover { background: #e0bc6a !important; }

    /* LOGS */
    .log-item {
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 8px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .log-left { flex: 1; }
    .log-action { font-weight: bold; color: #c9a84c; font-size: 0.85rem; margin-bottom: 4px; }
    .log-details { color: #ccc; font-size: 0.9rem; }
    .log-user { color: #888; font-size: 0.8rem; margin-top: 4px; }
    .log-time { color: #555; font-size: 0.78rem; white-space: nowrap; }

    .log-action.LOGIN { color: #2ecc71; }
    .log-action.FAILED_LOGIN { color: #e74c3c; }
    .log-action.POST_ARTICLE { color: #3498db; }
    .log-action.DELETE_ARTICLE { color: #e74c3c; }
    .log-action.CENSOR_ARTICLE { color: #e67e22; }
    .log-action.UNCENSOR_ARTICLE { color: #f1c40f; }
    .log-action.EDIT_ARTICLE { color: #9b59b6; }
    .log-action.CREATE_USER { color: #2ecc71; }
    .log-action.DELETE_USER { color: #e74c3c; }
    .log-action.CHANGE_ROLE { color: #1abc9c; }

    .log-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .log-filter-btn {
      padding: 6px 14px !important;
      width: auto !important;
      font-size: 0.8rem !important;
      background: #1a1a1a !important;
      color: #aaa !important;
      border: 1px solid #333 !important;
    }

    .log-filter-btn.active {
      background: #c9a84c !important;
      color: #000 !important;
      border-color: #c9a84c !important;
    }
  </style>
</head>
<body class="portal">

<!-- LOGIN -->
<div id="login-screen">
  <h1>Jaronite News Inc.</h1>
  <p>Employee Portal — Authorized Personnel Only</p>
  <div class="login-box">
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error-msg"></p>
  </div>
</div>

<!-- PORTAL -->
<div id="portal-screen" style="display:none;">
  <div class="portal-header">
    <h1>Jaronite News — Employee Portal</h1>
    <div class="right">
      <span>Logged in as <strong id="user-display"></strong></span>
      <button class="btn-secondary" style="width:auto;padding:8px 16px;" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="portal-body">

    <!-- POST ARTICLE -->
    <div class="card">
      <h2>Post New Article</h2>
      <div class="form-group">
        <input type="text" id="title" placeholder="Article Title">
        <select id="category">
          <option value="mayoral-election">Mayoral Election</option>
          <option value="city-projects">City Projects & Infrastructure</option>
          <option value="crime-justice">Crime & Justice</option>
          <option value="business-economy">Business & Economy</option>
        </select>
        <textarea id="content" placeholder="Write your article here..."></textarea>
        <button onclick="postArticle()">Publish Article</button>
        <p id="post-msg"></p>
      </div>
    </div>

    <!-- ADMIN SECTION -->
    <div class="card" id="admin-section" style="display:none;">
      <h2>Admin Controls</h2>

      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('all', this)">All Articles</button>
        <button class="tab" onclick="switchTab('censored', this)">Censored</button>
        <button class="tab" onclick="switchTab('users', this)">Users</button>
        <button class="tab" onclick="switchTab('logs', this)">Logs</button>
      </div>

      <div id="admin-articles-list"></div>

      <!-- USER MANAGEMENT -->
      <div id="user-management-section" style="display:none;">
        <h3 style="color:#c9a84c; margin-bottom:16px;">Create New User</h3>
        <div class="form-group" style="margin-bottom:30px;">
          <input type="text" id="new-username" placeholder="Username">
          <input type="password" id="new-password" placeholder="Password">
          <select id="new-role">
            <option value="employee">Employee</option>
            <option value="manager">Manager</option>
            <option value="admin">Admin</option>
          </select>
          <button onclick="createUser()" style="width:auto;padding:10px 20px;">Create User</button>
          <p id="create-user-msg"></p>
        </div>
        <h3 style="color:#c9a84c; margin-bottom:16px;">Existing Users</h3>
        <div id="users-list">Loading...</div>
      </div>

      <!-- LOGS -->
      <div id="logs-section" style="display:none;">
        <div class="log-filters">
          <button class="log-filter-btn active" onclick="filterLogs('ALL', this)">All</button>
          <button class="log-filter-btn" onclick="filterLogs('LOGIN', this)">Logins</button>
          <button class="log-filter-btn" onclick="filterLogs('FAILED_LOGIN', this)">Failed Logins</button>
          <button class="log-filter-btn" onclick="filterLogs('POST_ARTICLE', this)">Posts</button>
          <button class="log-filter-btn" onclick="filterLogs('DELETE_ARTICLE', this)">Deletions</button>
          <button class="log-filter-btn" onclick="filterLogs('CENSOR_ARTICLE', this)">Censors</button>
          <button class="log-filter-btn" onclick="filterLogs('EDIT_ARTICLE', this)">Edits</button>
          <button class="log-filter-btn" onclick="filterLogs('CREATE_USER', this)">User Created</button>
          <button class="log-filter-btn" onclick="filterLogs('DELETE_USER', this)">User Deleted</button>
          <button class="log-filter-btn" onclick="filterLogs('CHANGE_ROLE', this)">Role Changes</button>
        </div>
        <div id="logs-list">Loading...</div>
      </div>

    </div>

  </div>
</div>

<script>
  let currentUser = null;
  let allLogs = [];

  async function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });

    const data = await res.json();

    if (data.success) {
      currentUser = data.user;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('portal-screen').style.display = 'block';
      document.getElementById('user-display').textContent = data.user.username;

      if (data.user.role === 'admin') {
        document.getElementById('admin-section').style.display = 'block';
        loadAdminArticles('all');
      }
    } else {
      document.getElementById('error-msg').textContent = 'Invalid username or password.';
    }
  }

  async function postArticle() {
    const title = document.getElementById('title').value;
    const category = document.getElementById('category').value;
    const content = document.getElementById('content').value;

    if (!title || !content) {
      document.getElementById('post-msg').textContent = 'Please fill in all fields.';
      document.getElementById('post-msg').style.color = '#e74c3c';
      return;
    }

    const res = await fetch('/api/articles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, category, content, author: currentUser.username })
    });

    const data = await res.json();
    const msg = document.getElementById('post-msg');
    if (data.success) {
      msg.style.color = '#2ecc71';
      msg.textContent = 'Article published successfully!';
      document.getElementById('title').value = '';
      document.getElementById('content').value = '';
      if (currentUser.role === 'admin') loadAdminArticles('all');
    } else {
      msg.style.color = '#e74c3c';
      msg.textContent = 'Failed to publish article.';
    }
  }

  async function loadAdminArticles(filter) {
    const res = await fetch('/api/admin/articles', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, filter })
    });
    const articles = await res.json();
    const container = document.getElementById('admin-articles-list');

    if (!articles.length) {
      container.innerHTML = '<p style="color:#666">No articles found.</p>';
      return;
    }

    container.innerHTML = articles.map(a => `
      <div class="article-item" id="article-${a.id}">
        <h3>${a.title} ${a.status === 'censored' ? '<span class="censored-label">[CENSORED]</span>' : ''}</h3>
        <div class="meta">By ${a.author} · ${a.category} · ${new Date(a.created_at).toLocaleDateString()}</div>
        <div class="preview">${a.content.substring(0, 150)}...</div>
        <div class="article-actions">
          <button class="btn-edit" onclick="toggleEdit(${a.id})">Edit</button>
          <button class="btn-censor" onclick="censorArticle(${a.id})">${a.status === 'censored' ? 'Uncensor' : 'Censor'}</button>
          <button class="btn-danger" onclick="deleteArticle(${a.id})">Delete</button>
        </div>
        <div class="edit-form" id="edit-form-${a.id}">
          <input type="text" id="edit-title-${a.id}" value="${escapeHtml(a.title)}">
          <textarea id="edit-content-${a.id}">${escapeHtml(a.content)}</textarea>
          <button onclick="saveEdit(${a.id})" style="width:auto;padding:10px 20px;">Save Changes</button>
        </div>
      </div>
    `).join('');
  }

  function toggleEdit(id) {
    const form = document.getElementById(`edit-form-${id}`);
    form.classList.toggle('open');
  }

  async function saveEdit(id) {
    const title = document.getElementById(`edit-title-${id}`).value;
    const content = document.getElementById(`edit-content-${id}`).value;

    await fetch('/api/admin/edit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, id, title, content })
    });

    loadAdminArticles('all');
  }

  async function censorArticle(id) {
    await fetch('/api/admin/censor', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, id })
    });
    loadAdminArticles('all');
  }

  async function deleteArticle(id) {
    if (!confirm('Are you sure you want to delete this article?')) return;
    await fetch('/api/admin/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, id })
    });
    loadAdminArticles('all');
  }

  function switchTab(filter, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');

    document.getElementById('admin-articles-list').style.display = 'none';
    document.getElementById('user-management-section').style.display = 'none';
    document.getElementById('logs-section').style.display = 'none';

    if (filter === 'users') {
      document.getElementById('user-management-section').style.display = 'block';
      loadUsers();
    } else if (filter === 'logs') {
      document.getElementById('logs-section').style.display = 'block';
      loadLogs();
    } else {
      document.getElementById('admin-articles-list').style.display = 'block';
      loadAdminArticles(filter);
    }
  }

  async function loadLogs() {
    const res = await fetch('/api/admin/logs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username })
    });

    allLogs = await res.json();
    renderLogs(allLogs);
  }

  function renderLogs(logs) {
    const container = document.getElementById('logs-list');

    if (!logs.length) {
      container.innerHTML = '<p style="color:#666">No logs found.</p>';
      return;
    }

    container.innerHTML = logs.map(l => `
      <div class="log-item">
        <div class="log-left">
          <div class="log-action ${l.action}">${l.action.replace(/_/g, ' ')}</div>
          <div class="log-details">${l.details}</div>
          <div class="log-user">by ${l.username}</div>
        </div>
        <div class="log-time">${new Date(l.created_at).toLocaleString()}</div>
      </div>
    `).join('');
  }

  function filterLogs(type, btn) {
    document.querySelectorAll('.log-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (type === 'ALL') {
      renderLogs(allLogs);
    } else {
      renderLogs(allLogs.filter(l => l.action === type));
    }
  }

  async function createUser() {
    const newUsername = document.getElementById('new-username').value;
    const newPassword = document.getElementById('new-password').value;
    const role = document.getElementById('new-role').value;
    const msg = document.getElementById('create-user-msg');

    if (!newUsername || !newPassword) {
      msg.style.color = '#e74c3c';
      msg.textContent = 'Please fill in all fields.';
      return;
    }

    const res = await fetch('/api/admin/create-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, newUsername, newPassword, role })
    });

    const data = await res.json();
    if (data.success) {
      msg.style.color = '#2ecc71';
      msg.textContent = 'User created successfully!';
      document.getElementById('new-username').value = '';
      document.getElementById('new-password').value = '';
      loadUsers();
    } else {
      msg.style.color = '#e74c3c';
      msg.textContent = data.error || 'Failed to create user.';
    }
  }

  async function loadUsers() {
    const res = await fetch('/api/admin/users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username })
    });

    const users = await res.json();
    const container = document.getElementById('users-list');

    container.innerHTML = users.map(u => `
      <div class="article-item">
        <h3>${u.username} <span style="color:#888;font-size:0.85rem;">[${u.role}]</span></h3>
        <div class="article-actions" style="margin-top:10px;">
          <select id="role-select-${u.id}" style="width:auto;padding:6px 10px;">
            <option value="employee" ${u.role === 'employee' ? 'selected' : ''}>Employee</option>
            <option value="manager" ${u.role === 'manager' ? 'selected' : ''}>Manager</option>
            <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
          </select>
          <button class="btn-edit" onclick="changeRole(${u.id})">Change Role</button>
          <button class="btn-danger" onclick="deleteUser(${u.id})">Delete</button>
        </div>
      </div>
    `).join('');
  }

  async function changeRole(targetId) {
    const role = document.getElementById(`role-select-${targetId}`).value;
    await fetch('/api/admin/change-role', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, targetId, role })
    });
    loadUsers();
  }

  async function deleteUser(targetId) {
    if (!confirm('Are you sure you want to delete this user?')) return;
    await fetch('/api/admin/delete-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: currentUser.username, targetId })
    });
    loadUsers();
  }

  function logout() {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('portal-screen').style.display = 'none';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('error-msg').textContent = '';
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function escapeJs(str) {
    return str.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$');
  }
</script>

</body>
</html>
